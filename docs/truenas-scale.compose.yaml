# Baïkal — TrueNAS SCALE custom app (GHCR image from offsyanka99/Baikal)
# Release: 0.11.1-fork.4  ·  docs: https://github.com/offsyanka99/Baikal/tree/master/docs
#
# Use: Apps → Discover apps → Custom App / Install via YAML
#      (Electric Eel / 24.10+ Docker-based SCALE)
#
# Default: pull pre-built multi-arch image from GitHub Container Registry.
# Fallback: build from git (slower; needs GitHub + Packagist on the NAS).
#
# Before deploy:
# 1. Dataset + dirs:
#      mkdir -p /mnt/tank/apps/baikal/config /mnt/tank/apps/baikal/Specific/db
# 2. Ownership for nginx inside the image (uid/gid 101):
#      chown -R 101:101 /mnt/tank/apps/baikal
#    Then set BAIKAL_SKIP_CHOWN=1 below so startup does not re-chown mounts
#    (avoids a long hang on 40-fix-baikal-file-permissions.sh).
# 3. Edit volumes host path and host port if needed
# 4. Prefer HTTPS via TrueNAS reverse proxy / Caddy / Traefik in production
#
# After deploy:
# 1. Open http://NAS-IP:31088  → complete installer (admin password; SQLite OK)
# 2. Admin:  http://NAS-IP:31088/admin/
# 3. Portal: http://NAS-IP:31088/portal/   ← calendars + contacts (DAV user login)
# 4. DAV:    http://NAS-IP:31088/dav.php/  ← clients + classic browser
# 5. Health: http://NAS-IP:31088/health.php
# 6. Info:   http://NAS-IP:31088/info.php
#
# Portal (user-friendly):
#   1. Admin creates user1 + user2 under /admin/
#   2. user1 opens /portal/ , signs in with DAV password
#   3. Calendar: month view, events (RRULE), Edit modal (share, import/export .ics)
#      Add calendar → Import .ics (create + import); large files show live % progress
#      Bulk imports use chunked SQLite txs (typically seconds, not minutes, on NAS)
#   4. Contacts: address books, import/export .vcf (progress dialog for large files)
#   Classic backup UI: /dav.php/
#
# Home Assistant CalDAV:
#   URL:  http://NAS-IP:31088/dav.php/  (prefer HTTPS via reverse proxy)
#   User: a Baikal DAV user (create under Admin → Users), not admin
#   Image includes dual-format calendar-timezone (plain Olson id + VTIMEZONE).
#   No APPLY_HOME_ASSISTANT_FIX env needed (built-in; see docs/DEPLOYMENT.md).
#
# Backup regularly (both mounts):
#   config/   → baikal.yaml (admin hash, auth, feature flags)
#   Specific/ → SQLite DB (Specific/db), INSTALL_DISABLED, rate-limit file,
#               portal_meta.json (read-only / holidays flags)
#
# Auth notes:
#   Digest auth stores MD5 A1 hashes for DAV users (protocol design).
#   Prefer Basic + HTTPS when exposing outside LAN.
#   Admin password uses password_hash(); legacy SHA-256 upgrades on login.
#
# Optional env:
#   BAIKAL_LOCK_INSTALL=1     — refuse /admin/install after deploy
#   BAIKAL_ALLOW_REINSTALL=1  — re-open installer intentionally
#   PORTAL_LOG_LEVEL=debug    — browser console + Specific/portal_debug.log only
#                              (not docker/nginx; old images wrongly used error_log)
#   TIME_FORMAT=24h           — portal time display (auto|12h|24h)
#   BAIKAL_PORTAL_WEEK_START=monday
#
# Docs: https://github.com/offsyanka99/Baikal/tree/master/docs
#       docs/DEPLOYMENT.md · upstream https://sabre.io/baikal/

services:
  baikal:
    # --- Preferred: pin this fork release ---------------------------------
    image: ghcr.io/offsyanka99/baikal:0.11.1-fork.4
    # Or track master builds:
    # image: ghcr.io/offsyanka99/baikal:latest
    # image: ghcr.io/offsyanka99/baikal:sha-<git-sha>

    # --- Alternative: build from this fork on the NAS ---------------------
    # build:
    #   context: https://github.com/offsyanka99/Baikal.git#master
    # image: offsyanka99/baikal:local
    # pull_policy: build

    container_name: baikal
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "1.0"
          # 1G recommended for large .ics/.vcf imports (512M often OOMs mid-parse)
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 128M

    ports:
      - "31088:80"

    environment:
      TZ: "America/Toronto"
      TIME_FORMAT: "24h"                 # or 12h
      BAIKAL_PORTAL_WEEK_START: "monday" # or sunday
      # Portal debug → browser DevTools + Specific/portal_debug.log (default off).
      # PORTAL_LOG_LEVEL: "debug"        # off|error|warn|info|debug
      # Skip entrypoint chown (recommended on TrueNAS after host chown 101:101):
      BAIKAL_SKIP_CHOWN: "1"
      # After first successful install, recommended for internet-facing hosts:
      # BAIKAL_LOCK_INSTALL: "1"
      # MSMTPRC: |
      #   defaults
      #   auth on
      #   tls on

    volumes:
      # CHANGE to your TrueNAS dataset paths — back these up
      - /mnt/tank/apps/baikal/config:/var/www/baikal/config
      - /mnt/tank/apps/baikal/Specific:/var/www/baikal/Specific

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "-o",
          "/dev/null",
          "http://127.0.0.1/health.php",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
