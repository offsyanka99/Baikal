# Based on https://sabre.io/baikal/install/

server {
  listen 80;
  listen [::]:80;
  server_name _;

  root   /var/www/baikal/html;
  index index.php;

  rewrite ^/.well-known/caldav /dav.php redirect;
  rewrite ^/.well-known/carddav /dav.php redirect;

  charset utf-8;

  client_max_body_size 50M;

  # Security headers (also set in PHP for admin HTML pages)
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # CSP for static portal SPA (API is same-origin JSON)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

  location = /health.php {
    include        /etc/nginx/fastcgi_params;
    fastcgi_pass   unix:/var/run/php-fpm.sock;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
  }

  location = /info.php {
    include        /etc/nginx/fastcgi_params;
    fastcgi_pass   unix:/var/run/php-fpm.sock;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
  }

  # User portal SPA (TypeScript build → html/portal/)
  location = /portal {
    return 301 /portal/;
  }
  location /portal/ {
    # Prefer static assets; SPA fallback to index.html (avoid directory 403)
    try_files $uri $uri/index.html /portal/index.html;
  }

  # Portal JSON API → html/api/index.php with PATH_INFO=/login etc.
  location = /api {
    return 301 /api/;
  }
  location ~ ^/api(?:/(.*))?$ {
    include        /etc/nginx/fastcgi_params;
    fastcgi_pass   unix:/var/run/php-fpm.sock;
    fastcgi_param  SCRIPT_FILENAME  $document_root/api/index.php;
    fastcgi_param  PATH_INFO        /$1;
    # Large ICS/VCF imports stream NDJSON progress for up to ~15 minutes.
    # Without a high read timeout, nginx returns 504 after the default gap
    # (was 300s) while PHP is still writing calendar objects.
    fastcgi_read_timeout 900s;
    fastcgi_send_timeout 900s;
    fastcgi_connect_timeout 60s;
    # Pass progress lines to the client immediately (do not buffer the whole import)
    fastcgi_buffering off;
    gzip off;
    client_max_body_size 25M;
    # Allow PATCH for calendar property updates
    limit_except GET POST PUT PATCH DELETE OPTIONS {
      deny all;
    }
  }

  location ~ /(\.ht|Core|Specific|config) {
    deny all;
    return 404;
  }

  location ~ ^(.+\.php)(.*)$ {
    try_files $fastcgi_script_name =404;
    include        /etc/nginx/fastcgi_params;
    fastcgi_split_path_info  ^(.+\.php)(.*)$;
    fastcgi_pass   unix:/var/run/php-fpm.sock;
    fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
    fastcgi_param  PATH_INFO        $fastcgi_path_info;
  }

  location ~ /\.ht {
    deny all;
  }
}
